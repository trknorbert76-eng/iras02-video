<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Írás – Hitetlen</title>

<style>
body {
  margin: 0;
  background-color: black;
  text-align: center;
}

.video-wrapper {
  max-width: 960px;
  margin: 40px auto;
  padding: 0 12px;
}

.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
}

.video-container iframe {
  position: absolute;
  width: 100%;
  height: 100%;
}

#continueBtn {
  display: none;
  margin: 30px auto 40px auto;
  padding: 14px 28px;
  font-size: 20px;
  background-color: white;
  color: black;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

#continueBtn:hover { background-color: #ddd; }
</style>
</head>

<body>

<div class="video-wrapper">
  <div class="video-container">
    <iframe 
      id="mainVideo"
      src="https://www.youtube.com/embed/_nSPejsKDYc?enablejsapi=1&origin=https://trknorbert76-eng.github.io"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <button id="continueBtn">Folytatás</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  var player;
  var shown = false;
  var SHOW_AT = 160; // 2:40

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('mainVideo', {
      events: { 'onReady': onPlayerReady }
    });
  }

  function onPlayerReady() {
    setInterval(function () {
      if (!player || shown) return;

      var t = 0;
      try { t = player.getCurrentTime(); } catch (e) { return; }

      if (t >= SHOW_AT) {
        document.getElementById("continueBtn").style.display = "inline-block";
        shown = true;
      }
    }, 500);

    document.getElementById("continueBtn").onclick = function () {
      window.location.href = "https://trknorbert76-eng.github.io/iras-01/";
    };
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Írás – Hitetlen</title>

<style>
html, body {
  height: 100%;
}

body {
  margin: 0;
  background-color: black;

  /* EZ középre rak mindent */
  display: flex;
  justify-content: center;   /* vízszint */
  align-items: flex-start;   /* felül maradjon */
}

.video-wrapper {
  width: min(960px, 100%);
  margin-top: 40px;
  padding: 0 12px;
  box-sizing: border-box;
}

.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
}

.video-container iframe {
  position: absolute;
  width: 100%;
  height: 100%;
}

#continueBtn {
  display: none;
  margin: 30px auto 40px auto;
  padding: 14px 28px;
  font-size: 20px;
  background-color: #f59e0b;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  box-shadow: 0 0 0 rgba(245,158,11,0);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.6s ease;
}

#continueBtn.show {
  opacity: 1;
  transform: translateY(0);
  box-shadow: 0 0 25px rgba(245,158,11,0.6);
}

#continueBtn:hover {
  background-color: #d97706;
  box-shadow: 0 0 35px rgba(245,158,11,0.9);
}
</style>
</head>

<body>

<div class="video-wrapper">
  <div class="video-container">
    <iframe 
  id="mainVideo"
  src="https://www.youtube.com/embed/_nSPejsKDYc?enablejsapi=1&v=2"
  frameborder="0"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>
  </div>

  <button id="continueBtn">Folytatás</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  var player;
  var shown = false;
  var SHOW_AT = 160; // 2:40

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('mainVideo', {
      events: { 'onReady': onPlayerReady }
    });
  }

  function onPlayerReady() {
    setInterval(function () {
      if (!player || shown) return;

      var t = 0;
      try { t = player.getCurrentTime(); } catch (e) { return; }

      
   if (t >= SHOW_AT) {
  var btn = document.getElementById("continueBtn");
  btn.style.display = "inline-block";

  setTimeout(function(){
    btn.classList.add("show");
  }, 50);

  shown = true;
}
    }, 500);

    document.getElementById("continueBtn").onclick = function () {
      window.location.href = "https://trknorbert76-eng.github.io/iras-02/";
    };
  }
</script>

</body>
</html>

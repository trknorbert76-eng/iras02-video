<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Írás – Hívő</title>

<style>
body {
  margin: 0;
  background-color: black;
}

.video-wrapper {
  max-width: 960px;
  margin: 40px auto;   /* EZ teszi középre */
}

.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
}

.video-container iframe {
  position: absolute;
  width: 100%;
  height: 100%;
}

#continueBtn {
  display: none;
  margin: 30px auto;
  padding: 14px 28px;
  font-size: 20px;
  background-color: white;
  color: black;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="video-wrapper">
  <div class="video-container">
    <iframe 
      id="mainVideo"
      src="https://www.youtube.com/watch?v=_nSPejsKDYc"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
</div>

<button id="continueBtn">
  Folytatás
</button>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  var player;
  var shown = false;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('mainVideo', {
      events: {
        'onReady': onPlayerReady
      }
    });
  }

  function onPlayerReady() {
    // Stabil idő-ellenőrzés: fél másodpercenként ránézünk
    setInterval(function () {
      if (!player || shown) return;

      var t = 0;
      try {
        t = player.getCurrentTime();
      } catch (e) {
        return; // ha az API épp nem elérhető, ne omoljon össze
      }

      if (t >= 166) { // 2:40
        document.getElementById("continueBtn").style.display = "block";
        shown = true;
      }
    }, 500);

    // Gomb kattintás
    document.getElementById("continueBtn").onclick = function () {
      window.location.href = "https://trknorbert76-eng.github.io/iras-02/";
    };
  }
</script>

</body>

</html>
